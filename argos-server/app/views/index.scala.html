<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>A R G O S</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Inter', sans-serif;
            padding: 16px;
            margin: 0;
        }
        h1 {
            font-size: 2.4em;
            text-align: center;
            letter-spacing: 6px;
            margin: 0 0 4px 0;
            color: #212529;
        }
        .fecha-hoy {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* ── Tarjetas de estadísticas ── */
        .estadisticas {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 16px 36px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            min-width: 130px;
        }
        .stat-numero { font-size: 2.4em; font-weight: bold; }
        .stat-label  { color: #666; font-size: 0.8em; margin-top: 4px; font-weight: 600; letter-spacing: 1px; }
        .verde { color: #28a745; }
        .rojo  { color: #dc3545; }
        .azul  { color: #007bff; }

        /* ── Grid principal ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: auto auto;
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Columna izquierda: gráficas pequeñas apiladas */
        .columna-izq {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Columna derecha: línea de tiempo arriba, tabla abajo */
        .columna-der {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Fila inferior: por trabajador ocupa todo el ancho */
        .fila-inferior {
            grid-column: 1 / -1;
        }

        /* ── Panel genérico ── */
        .panel {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .panel h3 {
            text-align: center;
            margin: 0 0 12px 0;
            color: #333;
            font-size: 0.95em;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Wrappers de canvas (necesarios para SVG) */
        .chart-wrapper { position: relative; width: 100%; }
        .chart-wrapper canvas { display: none; }

        /* ── Tabla ── */
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa;
            color: #333;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
            font-size: 0.82em;
            letter-spacing: 1px;
        }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.88em; }
        tr:hover { background: #f8f9fa; }

        .badge-ok  { background: #d4edda; color: #155724; padding: 3px 10px; border-radius: 20px; font-weight: bold; font-size: 0.82em; }
        .badge-mal { background: #f8d7da; color: #721c24; padding: 3px 10px; border-radius: 20px; font-weight: bold; font-size: 0.82em; }
    </style>
</head>
<body>

    <h1>A R G O S</h1>
    <div class="fecha-hoy">HOY — <span id="fecha-hoy">--/--/----</span></div>

    <div class="estadisticas">
        <div class="stat-box">
            <div class="stat-numero azul" id="total">0</div>
            <div class="stat-label">TOTAL HOY</div>
        </div>
        <div class="stat-box">
            <div class="stat-numero verde" id="autorizados">0</div>
            <div class="stat-label">AUTORIZADOS</div>
        </div>
        <div class="stat-box">
            <div class="stat-numero rojo" id="denegados">0</div>
            <div class="stat-label">DENEGADOS</div>
        </div>
    </div>

    <div class="dashboard-grid">

        <!-- Columna izquierda -->
        <div class="columna-izq">

            <div class="panel">
                <h3>Tasa de Cumplimiento</h3>
                <div class="chart-wrapper">
                    <canvas id="graficaCumplimiento"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3>Nivel de Seguridad</h3>
                <div class="chart-wrapper">
                    <canvas id="graficaSemaforo"></canvas>
                </div>
            </div>

            <div class="panel">
                <h3>Top EPP Faltante</h3>
                <div class="chart-wrapper">
                    <canvas id="graficaFaltantes"></canvas>
                </div>
            </div>

        </div>

        <!-- Columna derecha -->
        <div class="columna-der">

            <div class="panel">
                <h3>Actividad por Hora — Hoy</h3>
                <div class="chart-wrapper">
                    <canvas id="graficaLinea"></canvas>
                </div>
            </div>

            <div class="panel">
                <table>
                    <thead>
                        <tr>
                            <th>TRABAJADOR</th>
                            <th>MARCA DE TIEMPO</th>
                            <th>RESULTADO</th>
                            <th>FASE</th>
                            <th>EPP FALTANTE</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>

        </div>

        <!-- Fila inferior — ancho completo -->
        <div class="panel fila-inferior">
            <h3>Cumplimiento por Trabajador — Hoy</h3>
            <div class="chart-wrapper">
                <canvas id="graficaTrabajador"></canvas>
            </div>
        </div>

    </div>

    <script src="@routes.Assets.versioned("javascripts/argos.js")"></script>

</body>
</html>
