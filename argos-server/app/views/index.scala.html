<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <title> A R G O S </title>
    <style>
        body {
            background-color: #f4f6f9;
            color: #000000;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #000000;
            font-size: 3em;
            text-align: center;
            letter-spacing: 4px;
            margin-top: 10px;
        }
        .estadisticas {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 20px 40px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-width: 150px;
        }
        .stat-numero { font-size: 2.5em; font-weight: bold; }
        .stat-label { color: #555555; font-size: 0.9em; margin-top: 5px; font-weight: bold; }
        
        .verde { color: #28a745; } 
        .rojo  { color: #dc3545; }
        .azul  { color: #007bff; }

        /* NUEVO: Contenedor tipo Grid para Layout Lado a Lado */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr; /* Columna izq de 350px, Columna der toma el resto */
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        /* Contenedor para la columna de las gráficas */
        .columna-graficas {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Tarjeta blanca para cada gráfica */
        .panel-grafico {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .panel-grafico h3 {
            text-align: center;
            margin-top: 0;
            color: #333;
            font-size: 1.1em;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Contenedor de la tabla */
        .panel-tabla {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto; /* Por si la pantalla es pequeña */
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            color: #333;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
            font-weight: bold;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        tr:hover { background: #f1f3f5; }
        
        .badge-ok { background: #d4edda; color: #155724; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.85em; }
        .badge-mal { background: #f8d7da; color: #721c24; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.85em; }
    </style>
</head>
<body>

    <h1>A R G O S</h1>

    <div class="estadisticas">
        <div class="stat-box">
            <div class="stat-numero azul" id="total">0</div>
            <div class="stat-label">TOTAL HOY</div>
        </div>
        <div class="stat-box">
            <div class="stat-numero verde" id="autorizados">0</div>
            <div class="stat-label">AUTORIZADOS</div>
        </div>
        <div class="stat-box">
            <div class="stat-numero rojo" id="denegados">0</div>
            <div class="stat-label">DENEGADOS</div>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="columna-graficas">
            <div class="panel-grafico">
                <h3>Tasa de Cumplimiento</h3>
                <canvas id="graficaCumplimiento"></canvas>
            </div>
            
            <div class="panel-grafico">
                <h3>Top EPP Faltante</h3>
                <canvas id="graficaFaltantes"></canvas>
            </div>
        </div>

        <div class="panel-tabla">
            <table>
                <thead>
                    <tr>
                        <th>TRABAJADOR</th>
                        <th>MARCA DE TIEMPO</th>
                        <th>RESULTADO</th>
                        <th>FASE</th>
                        <th>EPP FALTANTE</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                </tbody>
            </table>
        </div>

    </div>

    <script>
        let chartDona; 
        let chartBarras;

        function cargarHistorial() {
            fetch('/historial')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('tabla-body');
                    if (data.length === 0) return;

                    // --- 1. ACTUALIZAR ESTADÍSTICAS ---
                    const autorizados = data.filter(a => a.resultado === 'AUTORIZADO').length;
                    const denegados   = data.filter(a => a.resultado === 'DENEGADO').length;
                    document.getElementById('total').textContent       = data.length;
                    document.getElementById('autorizados').textContent = autorizados;
                    document.getElementById('denegados').textContent   = denegados;

                    // --- 2. GRÁFICA DE DONA (Cumplimiento) ---
                    const ctxDona = document.getElementById('graficaCumplimiento').getContext('2d');
                    if (chartDona) {
                        chartDona.data.datasets[0].data = [autorizados, denegados];
                        chartDona.update();
                    } else {
                        chartDona = new Chart(ctxDona, {
                            type: 'doughnut',
                            data: {
                                labels: ['Autorizados', 'Denegados'],
                                datasets: [{
                                    data: [autorizados, denegados],
                                    backgroundColor: ['#28a745', '#dc3545'],
                                    borderWidth: 0
                                }]
                            },
                            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                        });
                    }

                    // --- 3. GRÁFICA DE BARRAS (Top EPP Faltante) ---
                    // Contar qué EPP falta más
                    const conteoEpp = {};
                    data.forEach(a => {
                        if (a.resultado === 'DENEGADO' && a.faltante && a.faltante !== '—') {
                            conteoEpp[a.faltante] = (conteoEpp[a.faltante] || 0) + 1;
                        }
                    });
                    
                    // Ordenar de mayor a menor
                    const etiquetasEpp = Object.keys(conteoEpp).sort((a, b) => conteoEpp[b] - conteoEpp[a]);
                    const valoresEpp = etiquetasEpp.map(e => conteoEpp[e]);

                    const ctxBarras = document.getElementById('graficaFaltantes').getContext('2d');
                    if (chartBarras) {
                        chartBarras.data.labels = etiquetasEpp;
                        chartBarras.data.datasets[0].data = valoresEpp;
                        chartBarras.update();
                    } else {
                        chartBarras = new Chart(ctxBarras, {
                            type: 'bar', // Barra horizontal es mejor para nombres largos
                            data: {
                                labels: etiquetasEpp,
                                datasets: [{
                                    label: 'Incidentes',
                                    data: valoresEpp,
                                    backgroundColor: '#ffc107', // Color amarillo advertencia
                                    borderRadius: 4
                                }]
                            },
                            options: { 
                                indexAxis: 'y', // Convierte barras verticales a horizontales
                                responsive: true, 
                                plugins: { legend: { display: false } }, // Ocultamos la leyenda
                                scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
                            }
                        });
                    }

                    // --- 4. ACTUALIZAR TABLA ---
                    tbody.innerHTML = '';
                    data.slice().reverse().forEach(a => {
                        const badge = a.resultado === 'AUTORIZADO'
                            ? `<span class="badge-ok">AUTORIZADO</span>`
                            : `<span class="badge-mal">DENEGADO</span>`;
                        
                        tbody.innerHTML += `
                            <tr>
                                <td>${a.trabajador || '—'}</td>
                                <td>${a.timestamp || '—'}</td>
                                <td>${badge}</td>
                                <td>${a.fase || '—'}</td>
                                <td>${a.faltante || '—'}</td>
                            </tr>`;
                    });
                })
                .catch(err => console.error('Error al cargar historial:', err));
        }

        // Iniciar
        cargarHistorial();
        setInterval(cargarHistorial, 3000);
    </script>

</body>
</html>
